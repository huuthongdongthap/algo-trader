name: Deploy

on:
  # Only deploy after CI workflow completes successfully on main
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to M1 Max
    runs-on: self-hosted
    # Only run if CI passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Pull latest code
        run: |
          cd ~/projects/algo-trade
          git pull origin main

      - name: Install dependencies
        run: |
          cd ~/projects/algo-trade
          pnpm install --frozen-lockfile

      - name: Restart service
        run: |
          cd ~/projects/algo-trade
          pm2 restart algo-trade --env production 2>/dev/null || pm2 start "npx tsx src/app.ts" --name algo-trade --env production

      - name: Health check
        run: |
          echo "Waiting 5s for service to restart..."
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
          echo "Health check HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Deploy SUCCESS - algo-trade running on M1 Max"
          else
            echo "Deploy WARNING - health check returned $HTTP_STATUS"
          fi
