name: Deploy

on:
  # Only deploy after CI workflow completes successfully on main
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to M1 Max
    runs-on: ubuntu-latest
    # Only run if CI passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: macbook
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/projects/algo-trader
            git pull origin main
            npm rebuild better-sqlite3
            pm2 restart algo-trade --env production

      - name: Health check
        run: |
          echo "Waiting 10s for service to restart..."
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.cashclaw.cc/api/health)
          echo "Health check HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Deploy SUCCESS - production is GREEN at https://api.cashclaw.cc"
          else
            echo "Deploy FAILED - health check returned $HTTP_STATUS"
            exit 1
          fi

      - name: Notify deploy status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "DEPLOY SUCCESS: algo-trade live at https://api.cashclaw.cc"
          else
            echo "DEPLOY FAILED: check SSH logs and service status"
          fi
