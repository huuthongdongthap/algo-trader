name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies and build native modules
        run: pnpm install --config.ignore-scripts=false
        env:
          npm_config_build_from_source: true

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run
